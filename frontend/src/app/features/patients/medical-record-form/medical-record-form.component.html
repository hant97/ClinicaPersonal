<div class="modal-content card">
  <div class="modal-header">
    <h2>{{ record?.id ? 'Editar Registro Médico' : 'Nuevo Registro Médico' }}</h2>
    <button class="close-btn" (click)="cancel()">×</button>
  </div>

  <form [formGroup]="recordForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label class="form-label">Diagnóstico Principal</label>
      <textarea formControlName="diagnosis" class="input-field" rows="3" placeholder="Diagnóstico médico o psicológico..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Medicación Actual</label>
      <textarea formControlName="currentMedication" class="input-field" rows="3" placeholder="Medicamentos..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Plan de Tratamiento</label>
      <textarea formControlName="treatmentPlan" class="input-field" rows="4" placeholder="Estrategia u objetivos..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Estado del Tratamiento</label>
      <select formControlName="treatmentStatus" class="input-field">
        <option value="Activo">Activo</option>
        <option value="Pausado">Pausado</option>
        <option value="Alta">Alta</option>
        <option value="Abandonado">Abandonado</option>
      </select>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="cancel()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="recordForm.invalid || isSaving">
        {{ record?.id ? 'Guardar Cambios' : 'Crear Registro' }}
      </button>
    </div>
  </form>
</div>
