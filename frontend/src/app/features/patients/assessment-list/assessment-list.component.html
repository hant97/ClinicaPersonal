<div class="card assessments-card">
  <div class="header">
    <h3 class="section-title">Evaluaciones Psicométricas</h3>
    <button class="btn btn-primary" (click)="openForm()">+ Registrar Evaluación</button>
  </div>

  <div class="table-responsive">
    <ng-container *ngIf="assessments.length > 0; else noData">
      <div *ngIf="assessments.length > 1" class="chart-container" style="position: relative; height: 300px; width: 100%; margin-bottom: 25px; padding: 15px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
        <canvas #chartCanvas></canvas>
      </div>

      <div style="border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0;">
        <table class="table" style="margin: 0;">
        <thead style="background-color: #edf2f7;">
          <tr>
            <th style="color: #4a5568; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; padding: 16px;">Fecha</th>
            <th style="color: #4a5568; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; padding: 16px;">Test</th>
            <th style="color: #4a5568; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; padding: 16px;">Puntaje Total</th>
            <th style="color: #4a5568; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; padding: 16px;">Notas</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let assessment of assessments" style="transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#f7fafc'" onmouseout="this.style.backgroundColor='transparent'">
            <td style="padding: 16px; color: #4a5568; font-weight: 500;">
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 0.95rem;">{{ assessment.assessmentDate | date:'dd/MM/yyyy HH:mm' }}</span>
              </div>
            </td>
            <td style="padding: 16px; color: #2d3748; font-weight: 600;">{{ assessment.testName }}</td>
            <td style="padding: 16px;">
              <span class="score-badge" style="background-color: #805ad5; box-shadow: 0 2px 4px rgba(128,90,213,0.3);">{{ assessment.totalScore }}</span>
            </td>
            <td class="notes-col" style="padding: 16px; color: #718096; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" [title]="assessment.notes || ''">{{ assessment.notes || '-' }}</td>
          </tr>
        </tbody>
        </table>
      </div>
      
      <app-pagination 
        [currentPage]="currentPage" 
        [totalPages]="totalPages" 
        (pageChange)="onPageChange($event)">
      </app-pagination>
    </ng-container>
    <ng-template #noData>
      <div class="empty-state">
        <p>No hay evaluaciones registradas para este paciente.</p>
      </div>
    </ng-template>
  </div>
</div>

<app-assessment-form 
  *ngIf="showForm" 
  [patientId]="patientId" 
  (close)="closeForm($event)">
</app-assessment-form>
