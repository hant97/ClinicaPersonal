<div class="card">
  <div class="header-actions">
    <h2>Agenda de Citas</h2>
    <button class="btn-primary" (click)="openForm()">
      <lucide-icon [img]="Plus" [size]="18"></lucide-icon>
      Agendar Cita
    </button>
  </div>
  
  <div class="calendar-placeholder">
    <div class="agenda-list" *ngIf="appointments.length > 0; else noAppointments">
      <div class="agenda-item" *ngFor="let appointment of appointments">
        <div class="time">
          <lucide-icon [img]="Calendar" [size]="16" style="margin-right: 4px; vertical-align: text-bottom;"></lucide-icon>
          {{ appointment.appointmentDate | date:'dd/MM/yyyy hh:mm a' }}
        </div>
        <div class="details">
          <h4>{{ appointment.patientName }}</h4>
          <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">{{ appointment.notes || 'Sin detalles' }}</p>
        </div>
        <div class="status-container">
          <div class="status" [ngClass]="getStatusClass(appointment.status)">
            {{ getStatusText(appointment.status) }}
          </div>
          
          <div class="action-menu-container">
            <button class="action-trigger" (click)="toggleMenu(appointment.id)">
              <lucide-icon [img]="MoreVertical" [size]="20"></lucide-icon>
            </button>
            <div class="dropdown-menu" *ngIf="openMenuId === appointment.id">
              <button class="dropdown-item confirm-item" (click)="confirmAppointment(appointment)" *ngIf="appointment.status !== 'CONFIRMED'">
                Confirmar Cita
              </button>
              <button class="dropdown-item" (click)="openRescheduleForm(appointment)">
                Reprogramar
              </button>
              <button class="dropdown-item danger-item" (click)="cancelAppointment(appointment)" *ngIf="appointment.status !== 'CANCELLED'">
                Cancelar Cita
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <ng-template #noAppointments>
      <p class="placeholder-text" style="text-align: center; padding: 40px; color: #888;">
        No hay citas registradas en la agenda.
      </p>
    </ng-template>
  </div>
</div>

<app-appointment-form *ngIf="showForm" 
  [appointment]="appointmentToEdit"
  (saved)="onAppointmentSaved()" 
  (cancelled)="closeForm()">
</app-appointment-form>
