<div class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" (click)="onCancel()">&times;</button>
    <h3>Agendar Nueva Cita</h3>

    <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="patientId">Paciente *</label>
        <select id="patientId" formControlName="patientId" class="form-control">
          <option value="" disabled selected>Seleccione un paciente</option>
          <option *ngFor="let p of patients" [value]="p.id">
            {{ p.firstName }} {{ p.lastName }} ({{ p.identificationDocument }})
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="appointmentDate">Fecha y Hora *</label>
        <input type="datetime-local" id="appointmentDate" formControlName="appointmentDate" class="form-control">
      </div>

      <div class="form-group">
        <label for="status">Estado *</label>
        <select id="status" formControlName="status" class="form-control">
          <option value="SCHEDULED">Programada</option>
          <option value="CONFIRMED">Confirmada</option>
          <option value="ATTENDED">Atendida</option>
          <option value="MISSED">No asistió</option>
        </select>
      </div>

      <div class="form-group">
        <label for="notes">Notas / Motivo</label>
        <textarea id="notes" formControlName="notes" class="form-control" rows="3"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Guardando...' : 'Agendar' }}
        </button>
      </div>
    </form>
  </div>
</div>
