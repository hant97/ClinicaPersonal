<div class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" (click)="onCancel()">&times;</button>
    <h3>Registrar Cobro</h3>

    <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="patientId">Paciente *</label>
        <select id="patientId" formControlName="patientId" class="form-control">
          <option value="" disabled selected>Seleccione un paciente</option>
          <option *ngFor="let p of patients" [value]="p.id">
            {{ p.firstName }} {{ p.lastName }} ({{ p.identificationDocument }})
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="amount">Monto (S/) *</label>
        <div class="input-group">
          <span class="input-prefix">S/</span>
          <input type="number" id="amount" formControlName="amount" class="form-control" step="0.01" min="0.01">
        </div>
      </div>

      <div class="form-group">
        <label for="paymentDate">Fecha y Hora *</label>
        <input type="datetime-local" id="paymentDate" formControlName="paymentDate" class="form-control">
      </div>

      <div class="form-group">
        <label for="paymentMethod">Método de Pago *</label>
        <select id="paymentMethod" formControlName="paymentMethod" class="form-control">
          <option value="CASH">Efectivo</option>
          <option value="TRANSFER">Transferencia</option>
          <option value="CARD">Tarjeta</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Descripción / Motivo</label>
        <input type="text" id="description" formControlName="description" class="form-control" placeholder="Ej. Sesión de Terapia">
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Guardando...' : 'Registrar Cobro' }}
        </button>
      </div>
    </form>
  </div>
</div>
