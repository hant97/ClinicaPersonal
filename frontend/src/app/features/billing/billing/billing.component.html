<div class="card">
  <div class="header-actions">
    <h2>Facturación Básica</h2>
    <div style="display: flex; gap: 1rem;">
      <button class="btn-secondary" (click)="exportPayments()" title="Exportar a Excel">
        <lucide-icon [img]="Download" [size]="18"></lucide-icon>
        Exportar
      </button>
      <button class="btn-primary" (click)="openForm()">
        <lucide-icon [img]="Plus" [size]="18"></lucide-icon>
        Registrar Pago
      </button>
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="minimal-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Paciente</th>
          <th>Descripción</th>
          <th>Monto</th>
          <th>Método</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let payment of payments">
          <td>{{ payment.paymentDate | date:'medium' }}</td>
          <td>{{ payment.patientName }}</td>
          <td>{{ payment.description || '-' }}</td>
          <td class="amount-cell">{{ payment.amount | currency:'PEN':'S/ ':'1.2-2' }}</td>
          <td>
            <span class="method-badge">{{ getPaymentMethodText(payment.paymentMethod) }}</span>
          </td>
          <td>
            <div class="d-flex" style="gap: 0.5rem;">
              <button class="btn-text" (click)="openForm(payment)" title="Editar">
                <lucide-icon [img]="Edit" [size]="18"></lucide-icon>
              </button>
              <button class="btn-text" (click)="deletePayment(payment.id!)" style="color: var(--danger);" title="Eliminar">
                <lucide-icon [img]="Trash2" [size]="18"></lucide-icon>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="payments.length === 0">
          <td colspan="6" class="empty-state">No hay pagos registrados.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-payment-form *ngIf="showForm"
  [payment]="selectedPayment"
  (saved)="onPaymentSaved()"
  (cancelled)="closeForm()">
</app-payment-form>
