<div class="layout-container">
  <!-- Mobile Overlay -->
  <div class="mobile-overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <div class="logo-img-container" *ngIf="clinicSettings?.logoUrl" style="width: 40px; height: 40px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; margin-right: 8px;">
        <img [src]="getLogoUrl(clinicSettings?.logoUrl)" alt="Logo" style="max-width: 100%; max-height: 100%; object-fit: contain;">
      </div>
      <div class="logo-icon" *ngIf="!clinicSettings?.logoUrl">🌿</div>
      <h2 style="font-size: 1.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ clinicSettings?.shortName || 'Cargando...' }}</h2>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="LayoutDashboard" [size]="20" [strokeWidth]="2"></lucide-icon>
        Dashboard
      </a>
      <a routerLink="/patients" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="Users" [size]="20" [strokeWidth]="2"></lucide-icon>
        Pacientes
      </a>
      <a routerLink="/agenda" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="CalendarDays" [size]="20" [strokeWidth]="2"></lucide-icon>
        Agenda
      </a>
      <a routerLink="/billing" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="Receipt" [size]="20" [strokeWidth]="2"></lucide-icon>
        Facturación
      </a>
      <a routerLink="/services" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="Activity" [size]="20" [strokeWidth]="2"></lucide-icon>
        Servicios
      </a>
      <a routerLink="/tests-catalog" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="ClipboardList" [size]="20" [strokeWidth]="2"></lucide-icon>
        Catálogo Pruebas
      </a>
      <a routerLink="/inventory" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="Package" [size]="20" [strokeWidth]="2"></lucide-icon>
        Inventario
      </a>
      <a routerLink="/settings/catalogs" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <lucide-icon [img]="Settings" [size]="20" [strokeWidth]="2"></lucide-icon>
        Configuración
      </a>
    </nav>
    <div class="sidebar-footer">
      <a routerLink="/login" class="nav-item logout-item">
        <lucide-icon [img]="LogOut" [size]="20" [strokeWidth]="2"></lucide-icon>
        Cerrar Sesión
      </a>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <lucide-icon [img]="Menu" [size]="24"></lucide-icon>
        </button>
        <div class="header-title">
          <h1>Bienvenida(o), {{ greetingName }}</h1>
        </div>
      </div>
      <div class="header-profile">
        <a routerLink="/profile" class="profile-link" title="Mi Perfil">
          <div class="avatar">{{ avatarLetter }}</div>
        </a>
      </div>
    </header>
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
