<div class="layout-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">🌿</div>
      <h2>Clínica Vida</h2>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="LayoutDashboard" [size]="20" [strokeWidth]="2"></lucide-icon>
        Dashboard
      </a>
      <a routerLink="/patients" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Users" [size]="20" [strokeWidth]="2"></lucide-icon>
        Pacientes
      </a>
      <a routerLink="/agenda" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="CalendarDays" [size]="20" [strokeWidth]="2"></lucide-icon>
        Agenda
      </a>
      <a routerLink="/billing" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Receipt" [size]="20" [strokeWidth]="2"></lucide-icon>
        Facturación
      </a>
    </nav>
    <div class="sidebar-footer">
      <a routerLink="/login" class="nav-item logout-item">
        <lucide-icon [img]="LogOut" [size]="20" [strokeWidth]="2"></lucide-icon>
        Cerrar Sesión
      </a>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1>Bienvenida, Dra.</h1>
      </div>
      <div class="header-profile">
        <div class="avatar">D</div>
      </div>
    </header>
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
