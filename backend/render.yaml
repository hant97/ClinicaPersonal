services:
  - type: web
    name: clinica-backend
    env: docker
    plan: free
    # Variables de entorno esperadas. Los valores (sync: false) indican que debes configurarlos manualmente en el Dashboard de Render.
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
